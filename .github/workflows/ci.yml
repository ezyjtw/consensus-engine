name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run tests with race detector
        run: go test -race -cover -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build all services
        run: |
          for cmd in cmd/*/; do
            svc=$(basename "$cmd")
            echo "Building $svc..."
            CGO_ENABLED=0 GOOS=linux go build -trimpath -o "bin/$svc" "./$cmd"
          done
      - name: Verify Docker builds
        run: |
          for df in Dockerfile Dockerfile.*; do
            echo "Building $df..."
            docker build -f "$df" -t "test-$(basename $df | tr '.' '-' | tr 'A-Z' 'a-z')" .
          done
