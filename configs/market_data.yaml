reconnect_backoff_ms: [1000, 2000, 4000, 8000, 16000]
orderbook_depth: 10
funding_poll_interval_s: 30

redis:
  addr: "localhost:6379"
  password: ""
  use_tls: false
  output_stream: "market:quotes"
