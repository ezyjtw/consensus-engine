# TRADING_MODE env var overrides this: PAPER | LIVE
trading_mode: PAPER

# Paper mode fill simulation parameters (global fallbacks).
sim_slippage_bps: 4.0
sim_latency_ms: 50
adverse_selection_bps: 10.0

# Per-venue simulation profiles for realistic paper fills.
# IMPORTANT: fee_bps_taker and fee_bps_maker should match your actual exchange
# fee tier. Check your 30-day volume tier and token discount (BNB, OKB, etc.)
# and update these values accordingly. Defaults assume base tier, no discounts.
#
# Reference fee schedules (perpetual futures, base tier, as of 2025-Q1):
#   Venue     Maker    Taker    Notes
#   Binance   2.0 bps  4.5 bps  USDT-M futures; -10% with BNB discount
#   OKX       2.0 bps  5.0 bps  USDT-M perps; -15% with OKB
#   Bybit     2.0 bps  5.5 bps  USDT perps
#   Deribit   0.0 bps  3.0 bps  BTC/ETH perps; maker rebate at higher tiers
#   HTX       2.0 bps  5.0 bps  USDT-M; -10% with HT
#   Gate      2.0 bps  5.0 bps  USDT perps; -25% with GT
venue_profiles:
  binance:
    latency_min_ms: 8
    latency_max_ms: 25
    slippage_bps: 2.0
    depth_slope_bps: 0.5
    fee_bps_taker: 4.5
    fee_bps_maker: 2.0
    partial_fill_pct: 0.05
  okx:
    latency_min_ms: 15
    latency_max_ms: 40
    slippage_bps: 3.0
    depth_slope_bps: 0.8
    fee_bps_taker: 5.0
    fee_bps_maker: 2.0
    partial_fill_pct: 0.08
  bybit:
    latency_min_ms: 12
    latency_max_ms: 35
    slippage_bps: 3.0
    depth_slope_bps: 0.7
    fee_bps_taker: 5.5
    fee_bps_maker: 2.0
    partial_fill_pct: 0.07
  deribit:
    latency_min_ms: 25
    latency_max_ms: 60
    slippage_bps: 4.0
    depth_slope_bps: 1.2
    fee_bps_taker: 3.0
    fee_bps_maker: 0.0
    partial_fill_pct: 0.10
  htx:
    latency_min_ms: 18
    latency_max_ms: 45
    slippage_bps: 3.5
    depth_slope_bps: 1.0
    fee_bps_taker: 5.0
    fee_bps_maker: 2.0
    partial_fill_pct: 0.09
  gate:
    latency_min_ms: 20
    latency_max_ms: 50
    slippage_bps: 3.5
    depth_slope_bps: 1.0
    fee_bps_taker: 5.0
    fee_bps_maker: 2.0
    partial_fill_pct: 0.09

# Live execution safety.
max_retries_per_leg: 3
hedge_drift_max_ms: 5000
min_partial_fill_pct: 0.10
recon_delay_ms: 2000

# Micro-live graduation caps — hard limits during initial live period.
# Raise these as confidence in live execution grows.
live_max_order_notional_usd: 10000   # $10k per leg
live_max_daily_notional_usd: 100000  # $100k rolling 24h
live_max_open_orders: 4              # max concurrent orders

tenant_id: "default"

redis:
  addr: "localhost:6379"
  password: ""
  use_tls: false
  input_stream: "trade:intents:approved"
  output_events: "execution:events"
  consumer_group: "execution-router"
  consumer_name: "worker-1"
  block_ms: 1000
  batch_size: 20
