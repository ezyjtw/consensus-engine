# TRADING_MODE env var overrides this: PAPER | LIVE
trading_mode: PAPER

# Paper mode fill simulation parameters (global fallbacks).
sim_slippage_bps: 4.0
sim_latency_ms: 50
adverse_selection_bps: 10.0

# Per-venue simulation profiles for realistic paper fills.
# latency: observed REST API round-trip range
# slippage_bps: base slippage for small orders
# depth_slope_bps: additional bps per $10k notional (larger orders = more slippage)
# fee_bps_taker: taker fee for this venue
# partial_fill_pct: probability of partial fill (0.0-1.0)
venue_profiles:
  binance:
    latency_min_ms: 8
    latency_max_ms: 25
    slippage_bps: 2.0
    depth_slope_bps: 0.5
    fee_bps_taker: 4.5
    partial_fill_pct: 0.05
  okx:
    latency_min_ms: 15
    latency_max_ms: 40
    slippage_bps: 3.0
    depth_slope_bps: 0.8
    fee_bps_taker: 5.0
    partial_fill_pct: 0.08
  bybit:
    latency_min_ms: 12
    latency_max_ms: 35
    slippage_bps: 3.0
    depth_slope_bps: 0.7
    fee_bps_taker: 5.5
    partial_fill_pct: 0.07
  deribit:
    latency_min_ms: 25
    latency_max_ms: 60
    slippage_bps: 4.0
    depth_slope_bps: 1.2
    fee_bps_taker: 3.0
    partial_fill_pct: 0.10

tenant_id: "default"

redis:
  addr: "localhost:6379"
  password: ""
  use_tls: false
  input_stream: "trade:intents:approved"
  output_events: "execution:events"
  consumer_group: "execution-router"
  consumer_name: "worker-1"
  block_ms: 1000
  batch_size: 20
