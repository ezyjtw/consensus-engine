symbols:
  - BTC-PERP
  - ETH-PERP

# Minimum consensus quality required to emit any intent.
# LOW is always rejected. MED requires higher edge threshold than HIGH.
min_consensus_quality: MED

# Net edge required per quality level (in basis points, after latency buffers).
min_edge_bps_net:
  HIGH: 6.0
  MED: 10.0
  LOW: 9999.0

# How long an emitted intent is considered valid by the execution router.
intent_ttl_ms:
  HIGH: 400
  MED: 250
  LOW: 0

# Extra buffer applied to both legs to account for latency and adverse selection.
# buyCost  = effective_buy  * (1 + latency_buffer/10000)
# sellValue = effective_sell * (1 - latency_buffer/10000)
latency_buffer_bps:
  HIGH: 2.0
  MED: 4.0
  LOW: 10.0

# Sizes attempted per opportunity search, largest first for max P&L capture.
size_ladder_usd:
  - 10000
  - 5000
  - 2000

# Per-leg max slippage guard embedded in price_limit of each leg.
max_slippage_bps: 8.0

# Minimum gap between intents for the same symbol+pair to prevent spam.
cooldown_ms: 300

# If false, WARN-status venues are excluded from arb legs (safer default).
allow_warn_venues: false

# Venues with the OUTLIER flag from the consensus engine are excluded.
ignore_flagged_venues: true

# Each pair [A, B] is checked in BOTH directions (buy-A/sell-B and buy-B/sell-A).
# Only pairs listed here are evaluated for a given symbol.
enabled_pairs:
  BTC-PERP:
    - [binance, okx]
    - [binance, bybit]
    - [binance, deribit]
    - [okx, bybit]
    - [okx, deribit]
    - [bybit, deribit]
  ETH-PERP:
    - [binance, okx]
    - [binance, bybit]
    - [binance, deribit]
    - [okx, bybit]
    - [okx, deribit]
    - [bybit, deribit]

# Spot-futures basis convergence strategy.
# Detects when mark-index basis is elevated and trades mean-reversion.
basis_trade:
  enabled: true
  min_basis_bps: 15.0
  min_z_score: 1.5
  max_notional_usd: 10000
  max_slippage_bps: 8.0
  intent_ttl_ms: 5000
  cooldown_ms: 5000
  window_size: 200
  eval_interval_s: 5

# Liquidation cascade detector.
# Detects OI drops + rapid price moves and emits contrarian (fade) trades.
cascade:
  enabled: true
  oi_drop_pct: 5.0
  price_move_bps: 50.0
  window_ms: 60000
  notional_usd: 5000
  max_slippage_bps: 15.0
  intent_ttl_ms: 3000
  cooldown_ms: 30000

# Multi-symbol correlation tracker.
# Monitors BTC/ETH correlation and emits pair trades on breakdown.
correlation:
  enabled: true
  primary_symbol: "BTC-PERP"
  secondary_symbol: "ETH-PERP"
  window_size: 100
  min_correlation: 0.85
  break_threshold: 0.5
  spread_z_score_min: 2.0
  notional_usd: 5000
  max_slippage_bps: 10.0
  intent_ttl_ms: 5000
  cooldown_ms: 60000

# DEX-CEX arbitrage.
# Compares DEX quotes (via 1inch/Paraswap) against CEX prices.
dex_cex:
  enabled: false
  min_edge_bps: 20.0
  max_notional_usd: 10000
  max_slippage_bps: 15.0
  intent_ttl_ms: 5000
  cooldown_ms: 10000
  chain_id: 42161
  stable_address: "0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9"  # USDT on Arbitrum
  token_addresses:
    WETH: "0x82aF49447D8a07e3bd95BD0d56f35241523fBab1"
    WBTC: "0x2f2a2543B76A4166549F7aaB2e75Bef0aefC5B0f"

redis:
  addr: "localhost:6379"
  password: ""
  use_tls: false
  input_stream: "consensus:updates"
  market_quotes_stream: "market:quotes"
  oi_stream: "market:open_interest"
  output_intents: "trade:intents"
  consumer_group: "arb-engine"
  consumer_name: "worker-1"
  block_ms: 1000
  batch_size: 100
