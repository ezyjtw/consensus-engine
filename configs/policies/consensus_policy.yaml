size_notional_usd: 10000.0
stale_ms: 750

outlier_bps_warn: 25.0
outlier_bps_blacklist: 50.0

warn_persist_ms: 500
blacklist_persist_ms: 1500
blacklist_ttl_ms: 60000
recovery_ms: 2000

spread_warn_bps: 10.0
min_core_quorum: 3

core_venues:
  - binance
  - okx
  - bybit
  - deribit

optional_venues:
  - htx
  - gate

symbols:
  - BTC-PERP
  - ETH-PERP
  - SOL-PERP
  - DOGE-PERP
  - XRP-PERP
  - AVAX-PERP
  - LINK-PERP
  - SUI-PERP
  - PEPE-PERP

base_trust:
  binance: 1.0
  okx: 0.9
  bybit: 0.85
  deribit: 0.80
  htx: 0.50
  gate: 0.50

slippage_buffer_bps: 5.0
depth_penalty_bps: 20.0

# Per-symbol threshold overrides for mid-cap tokens.
# Mid-caps have wider natural spreads (50-150 bps vs BTC's 5-10 bps) and
# higher cross-venue variance, so BTC-calibrated thresholds would cause
# constant false outlier detections and unnecessary blacklisting.
symbol_overrides:
  SOL-PERP:
    outlier_bps_warn: 40.0
    outlier_bps_blacklist: 80.0
    spread_warn_bps: 20.0
    size_notional_usd: 5000.0
    slippage_buffer_bps: 8.0
    depth_penalty_bps: 30.0
  DOGE-PERP:
    outlier_bps_warn: 60.0
    outlier_bps_blacklist: 120.0
    spread_warn_bps: 30.0
    size_notional_usd: 3000.0
    slippage_buffer_bps: 12.0
    depth_penalty_bps: 40.0
  XRP-PERP:
    outlier_bps_warn: 40.0
    outlier_bps_blacklist: 80.0
    spread_warn_bps: 20.0
    size_notional_usd: 5000.0
    slippage_buffer_bps: 8.0
    depth_penalty_bps: 30.0
  AVAX-PERP:
    outlier_bps_warn: 50.0
    outlier_bps_blacklist: 100.0
    spread_warn_bps: 25.0
    size_notional_usd: 3000.0
    slippage_buffer_bps: 10.0
    depth_penalty_bps: 35.0
  LINK-PERP:
    outlier_bps_warn: 50.0
    outlier_bps_blacklist: 100.0
    spread_warn_bps: 25.0
    size_notional_usd: 3000.0
    slippage_buffer_bps: 10.0
    depth_penalty_bps: 35.0
  SUI-PERP:
    outlier_bps_warn: 60.0
    outlier_bps_blacklist: 120.0
    spread_warn_bps: 30.0
    size_notional_usd: 2000.0
    slippage_buffer_bps: 12.0
    depth_penalty_bps: 40.0
  PEPE-PERP:
    outlier_bps_warn: 80.0
    outlier_bps_blacklist: 150.0
    spread_warn_bps: 40.0
    size_notional_usd: 2000.0
    slippage_buffer_bps: 15.0
    depth_penalty_bps: 50.0

redis:
  addr: "localhost:6379"
  password: ""
  use_tls: false   # set to true (or REDIS_TLS=true env) for Upstash / any TLS endpoint
  input_stream: "market:quotes"
  output_consensus: "consensus:updates"
  output_anomalies: "consensus:anomalies"
  output_status: "consensus:status"
  consumer_group: "consensus-engine"
  consumer_name: "worker-1"
  block_ms: 1000
  batch_size: 100
