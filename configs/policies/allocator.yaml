per_strategy_max_usd:
  CROSS_VENUE_ARB: 100000
  FUNDING_CARRY: 200000
  FUNDING_DIFFERENTIAL: 150000
  FUNDING_CARRY_REVERSE: 100000
  SPREAD_CAPTURE: 50000
  LIQUIDATION_CONTRA: 25000
  BASIS_CONVERGENCE: 75000
  CASCADE_CONTRA: 25000
  CORRELATION_BREAK: 50000
  DEX_CEX_ARB: 50000
  L2_BRIDGE_ARB: 25000
  # Exit strategies inherit from their parent strategy caps.
  FUNDING_CARRY_EXIT: 200000
  FUNDING_DIFFERENTIAL_EXIT: 150000
  FUNDING_CARRY_REVERSE_EXIT: 100000

per_venue_max_usd:
  binance: 200000
  okx: 150000
  bybit: 150000
  deribit: 100000

# Gate all new intents when margin utilisation exceeds this on any venue.
margin_utilisation_gate_pct: 75.0

# Consensus quality gates by strategy family.
min_quality_for_arb: MED
min_quality_for_funding: MED
min_quality_for_liquidity: HIGH

# Fractional Kelly position sizing.
# 0     = disabled (full notional up to cap — NOT recommended for live trading)
# 0.25  = quarter-Kelly: conservative, recommended for paper-to-live graduation
# 0.5   = half-Kelly: moderate, for established strategies with proven edge
# See: https://en.wikipedia.org/wiki/Kelly_criterion
kelly_fraction: 0.25

# OI-gated position sizing baseline. When current OI < baseline, sizes are reduced.
# Set to 0 to disable OI gating.
baseline_oi: 50000

redis:
  addr: "localhost:6379"
  password: ""
  use_tls: false
  input_stream: "trade:intents"
  output_stream: "trade:intents:approved"
  consumer_group: "capital-allocator"
  consumer_name: "worker-1"
  block_ms: 1000
  batch_size: 50
  fills_stream: "demo:fills"   # set to "live:fills" in live mode
